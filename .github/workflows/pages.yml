name: Publish Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "data/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/daily-job-post-counter.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site data
        run: |
          mkdir -p docs/data
          cp data/job_post_counts.csv docs/data/job_post_counts.csv

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
