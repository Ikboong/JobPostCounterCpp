name: Daily Job Post Counter

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-job-post-counter.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-job-post-counter
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Measure JobKorea count
        shell: pwsh
        run: ./run.ps1

      - name: Keep one record per day
        shell: pwsh
        run: |
          ./scripts/normalize_daily_records.ps1
          ./build/Release/JobPostCounter.exe --rewrite-xlsx-only

      - name: Check anomaly
        id: anomaly
        shell: pwsh
        run: ./scripts/check_anomaly.ps1

      - name: Commit updated data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/job_post_counts.csv data/job_post_counts.xlsx

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes to commit."
            exit 0
          }
          if ($LASTEXITCODE -ne 1) {
            throw "git diff failed with exit code $LASTEXITCODE"
          }

          git commit -m "Update job post counts"
          git push

      - name: Fail on anomaly
        if: steps.anomaly.outputs.is_anomaly == 'true'
        shell: pwsh
        run: |
          Write-Error "Abnormal JobKorea count detected: ${{ steps.anomaly.outputs.message }}"

  deploy-pages:
    needs: update
    if: ${{ always() && needs.update.result != 'cancelled' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Pull latest data
        run: git pull --ff-only origin main

      - name: Prepare site data
        run: |
          mkdir -p docs/data
          cp data/job_post_counts.csv docs/data/job_post_counts.csv

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
