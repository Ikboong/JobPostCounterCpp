name: Daily Job Post Counter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-job-post-counter
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Measure JobKorea count
        shell: pwsh
        run: ./run.ps1

      - name: Check anomaly
        id: anomaly
        shell: pwsh
        run: ./scripts/check_anomaly.ps1

      - name: Commit updated data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/job_post_counts.csv data/job_post_counts.xlsx

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes to commit."
            exit 0
          }
          if ($LASTEXITCODE -ne 1) {
            throw "git diff failed with exit code $LASTEXITCODE"
          }

          git commit -m "Update job post counts"
          git push

      - name: Fail on anomaly
        if: steps.anomaly.outputs.is_anomaly == 'true'
        shell: pwsh
        run: |
          Write-Error "Abnormal JobKorea count detected: ${{ steps.anomaly.outputs.message }}"
