name: Record External JobKorea Count

on:
  workflow_dispatch:
    inputs:
      timestamp_kst:
        description: "KST timestamp, yyyy-MM-dd HH:mm:ss"
        required: true
        type: string
      date_kst:
        description: "KST date, yyyy-MM-dd"
        required: true
        type: string
      count:
        description: "JobKorea posting count. Leave empty when status is error."
        required: false
        type: string
      status:
        description: "Measurement status"
        required: true
        default: "ok"
        type: choice
        options:
          - ok
          - error
      message:
        description: "Measurement detail"
        required: false
        default: "parsed joblist hdnGICnt"
        type: string
      source:
        description: "Measurement source URL"
        required: false
        default: "https://www.jobkorea.co.kr/recruit/joblist?menucode=local&localorder=1"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: job-post-counter-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Record external JobKorea count
        shell: pwsh
        env:
          INPUT_TIMESTAMP_KST: ${{ inputs.timestamp_kst }}
          INPUT_DATE_KST: ${{ inputs.date_kst }}
          INPUT_COUNT: ${{ inputs.count }}
          INPUT_STATUS: ${{ inputs.status }}
          INPUT_MESSAGE: ${{ inputs.message }}
          INPUT_SOURCE: ${{ inputs.source }}
        run: |
          ./scripts/record_external_count.ps1 `
            -TimestampKst $env:INPUT_TIMESTAMP_KST `
            -DateKst $env:INPUT_DATE_KST `
            -JobKoreaCount $env:INPUT_COUNT `
            -JobKoreaStatus $env:INPUT_STATUS `
            -JobKoreaMessage $env:INPUT_MESSAGE `
            -JobKoreaSource $env:INPUT_SOURCE

      - name: Keep one record per day
        shell: pwsh
        run: |
          ./scripts/normalize_daily_records.ps1
          ./build/Release/JobPostCounter.exe --rewrite-xlsx-only

      - name: Check anomaly
        id: anomaly
        shell: pwsh
        run: ./scripts/check_anomaly.ps1

      - name: Commit updated data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/job_post_counts.csv data/job_post_counts.xlsx

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes to commit."
            exit 0
          }
          if ($LASTEXITCODE -ne 1) {
            throw "git diff failed with exit code $LASTEXITCODE"
          }

          git commit -m "Record external JobKorea count"
          git push

      - name: Fail on anomaly
        if: steps.anomaly.outputs.is_anomaly == 'true'
        shell: pwsh
        run: |
          Write-Error "Abnormal JobKorea count detected: ${{ steps.anomaly.outputs.message }}"

  deploy-pages:
    needs: update
    if: ${{ always() && needs.update.result != 'cancelled' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Pull latest data
        run: git pull --ff-only origin main

      - name: Prepare site data
        run: |
          mkdir -p docs/data
          cp data/job_post_counts.csv docs/data/job_post_counts.csv

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
